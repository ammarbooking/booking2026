<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الحجز</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Tajawal',sans-serif}
    body{
      background:#0b0b18;
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .wrap{
      width:100%;
      max-width:420px;
      background:#131328;
      border:1px solid #232344;
      border-radius:20px;
      padding:24px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }
    h1{
      text-align:center;
      margin-bottom:8px;
      font-size:28px;
      font-weight:800;
      color:#c9a84c;
    }
    p{
      text-align:center;
      color:#999;
      margin-bottom:20px;
      font-size:14px;
    }
    .field{margin-bottom:12px}
    input,select{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid #2b2b4f;
      background:#0f0f22;
      color:#fff;
      font-size:15px;
      outline:none;
    }
    input:focus,select:focus{border-color:#c9a84c}
    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,#a07b2e,#c9a84c,#e8d48b);
      color:#111;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      margin-top:8px;
    }
    button:disabled{opacity:.5;cursor:not-allowed}
    .msg{
      margin-top:14px;
      padding:12px;
      border-radius:12px;
      text-align:center;
      display:none;
      font-size:14px;
    }
    .ok{display:block;background:#103125;color:#34d399;border:1px solid #1f5a45}
    .err{display:block;background:#341516;color:#f87171;border:1px solid #6b2024}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>إبداع عمار</h1>
    <p>احجز موعدك الآن</p>

    <div class="field">
      <input id="customer_name" type="text" placeholder="الاسم الكامل" />
    </div>

    <div class="field">
      <input id="customer_phone" type="tel" placeholder="رقم الجوال" />
    </div>

    <div class="field">
      <select id="branch">
        <option value="">اختر الفرع</option>
        <option value="الرياض">الرياض</option>
        <option value="الدمام">الدمام</option>
      </select>
    </div>

    <div class="field">
      <select id="service" onchange="updatePrice()">
        <option value="">اختر الخدمة</option>
        <option value="تركيب شعر">تركيب شعر</option>
        <option value="تغيير لاصق">تغيير لاصق</option>
      </select>
    </div>

    <div class="field">
      <input id="price" type="text" placeholder="السعر" readonly />
    </div>

    <div class="field">
      <input id="booking_date" type="date" />
    </div>

    <div class="field">
      <input id="booking_time" type="time" />
    </div>

    <div class="field">
      <select id="payment_method">
        <option value="">طريقة الدفع</option>
        <option value="cash">ادفع بالمكان</option>
        <option value="tabby">تابي</option>
        <option value="tamara">تمارا</option>
      </select>
    </div>

    <button id="bookBtn" onclick="confirmBooking()">تأكيد الحجز</button>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    // بدلي السطرين دول فقط
    const SUPABASE_URL = "PUT_YOUR_SUPABASE_URL_HERE";
    const SUPABASE_KEY = "PUT_YOUR_SUPABASE_ANON_KEY_HERE";

    function showMsg(text, type) {
      const msg = document.getElementById("msg");
      msg.className = "msg " + type;
      msg.textContent = text;
    }

    function updatePrice() {
      const service = document.getElementById("service").value;
      const price = document.getElementById("price");
      if (service === "تركيب شعر") price.value = "1700";
      else if (service === "تغيير لاصق") price.value = "150";
      else price.value = "";
    }

    function supaHeaders() {
      return {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        Prefer: "return=representation"
      };
    }

    async function saveBookingToSupabase(data) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/bookings`, {
        method: "POST",
        headers: supaHeaders(),
        body: JSON.stringify(data)
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(err || "insert failed");
      }

      return await res.json();
    }

    async function confirmBooking() {
      const btn = document.getElementById("bookBtn");

      const customer_name = document.getElementById("customer_name").value.trim();
      const customer_phone = document.getElementById("customer_phone").value.trim();
      const branch = document.getElementById("branch").value;
      const service = document.getElementById("service").value;
      const price = parseInt(document.getElementById("price").value || "0", 10);
      const booking_date = document.getElementById("booking_date").value;
      const booking_time = document.getElementById("booking_time").value;
      const payment_method = document.getElementById("payment_method").value;

      if (!customer_name || !customer_phone || !branch || !service || !price || !booking_date || !booking_time || !payment_method) {
        showMsg("كمّل كل البيانات أولًا", "err");
        return;
      }

      if (SUPABASE_URL.includes("PUT_YOUR") || SUPABASE_KEY.includes("PUT_YOUR")) {
        showMsg("حط بيانات Supabase الحقيقية الأول", "err");
        return;
      }

      btn.disabled = true;
      btn.textContent = "جاري الحفظ...";

      try {
        await saveBookingToSupabase({
          customer_name,
          customer_phone,
          branch,
          service,
          price,
          booking_date,
          booking_time,
          payment_method,
          status: "pending"
        });

        showMsg("تم الحجز بنجاح ✅", "ok");

        document.getElementById("customer_name").value = "";
        document.getElementById("customer_phone").value = "";
        document.getElementById("branch").value = "";
        document.getElementById("service").value = "";
        document.getElementById("price").value = "";
        document.getElementById("booking_date").value = "";
        document.getElementById("booking_time").value = "";
        document.getElementById("payment_method").value = "";
      } catch (error) {
        console.error(error);
        showMsg("حصلت مشكلة في الحفظ", "err");
      }

      btn.disabled = false;
      btn.textContent = "تأكيد الحجز";
    }
  </script>
</body>
</html>
