<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الحجز</title>
<style>
body{font-family:Arial;background:#111;color:#fff;text-align:center;padding:40px}
.b-card{background:#222;padding:15px;margin:5px;cursor:pointer;border-radius:8px}
.sel{background:gold;color:#000}
</style>
</head>

<body>

<h2>اختار الوقت</h2>
<div id="timeGrid"></div>

<script>
const SUPABASE_URL = "https://vmbaxqghabxzvkcxwjdy.supabase.co";
const SUPABASE_KEY = "sb_publishable_5maKs94zmK6Iu5TbpiHkWw_SM0Ew2Y2";

function supaHeaders() {
  return {
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`,
    "Content-Type": "application/json"
  };
}

// ✅ جلب المواعيد المحجوزة
async function getBookedTimes(date) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/bookings?booking_date=eq.${date}`,
    { headers: supaHeaders() }
  );

  if (!res.ok) return [];

  const data = await res.json();
  return data.map(b => b.booking_time);
}

// ⏰ توليد المواعيد
function genTimes() {
  let s = [];
  for (let h = 15; h <= 23; h++) {
    let d = h > 12 ? h - 12 : h;
    let p = h >= 12 ? 'م' : 'ص';
    s.push(d + ':00 ' + p);
    if (h < 23) s.push(d + ':30 ' + p);
  }
  return s;
}

let TIMES = genTimes();

// 📅 اليوم المختار (تقدر تغيره)
let selectedDate = "2026-03-23";

// 🎯 عرض المواعيد
async function renderTimes() {
  let g = document.getElementById('timeGrid');
  g.innerHTML = "تحميل...";

  let bookedTimes = await getBookedTimes(selectedDate);

  g.innerHTML = "";

  TIMES.forEach(t => {

    // ❌ لو محجوز → ما يظهرش
    if (bookedTimes.includes(t)) return;

    let div = document.createElement("div");
    div.className = "b-card";
    div.innerText = t;

    div.onclick = async () => {
      alert("تم اختيار: " + t);

      // نحفظ الحجز
      await fetch(`${SUPABASE_URL}/rest/v1/bookings`, {
        method: "POST",
        headers: supaHeaders(),
        body: JSON.stringify({
          booking_date: selectedDate,
          booking_time: t
        })
      });

      renderTimes(); // إعادة تحميل المواعيد
    };

    g.appendChild(div);
  });

  if (g.innerHTML === "") {
    g.innerHTML = "❌ لا يوجد مواعيد متاحة";
  }
}

renderTimes();
</script>

</body>
</html>
