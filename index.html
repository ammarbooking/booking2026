<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الحجز - إبداع عمار</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {background:#0b0b0b;color:#fff;font-family:sans-serif;text-align:center;padding:40px}
button{padding:12px 20px;margin:10px;border-radius:8px;border:none;background:#c9a84c;color:#000;font-weight:bold;cursor:pointer}
input{padding:10px;margin:10px;border-radius:6px;border:none;width:200px}
</style>
</head>

<body>

<h2>احجز الآن</h2>

<input id="name" placeholder="اسمك">
<input id="phone" placeholder="رقمك">

<br>

<button onclick="book()">تأكيد الحجز</button>

<script>
const SUPABASE_URL = "https://vmbaxqghabxzvkcwxjdy.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";

function headers() {
  return {
    "apikey": SUPABASE_KEY,
    "Authorization": "Bearer " + SUPABASE_KEY,
    "Content-Type": "application/json"
  };
}

async function book() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  try {
    // 1️⃣ حفظ الحجز
    await fetch(`${SUPABASE_URL}/rest/v1/bookings`, {
      method: "POST",
      headers: headers(),
      body: JSON.stringify({
        customer_name: name,
        customer_phone: phone,
        branch: "الرياض",
        service: "تركيب شعر",
        price: 1700,
        booking_date: "2026-03-31",
        booking_time: "5:00 م",
        payment_method: "ادفع بالمكان",
        status: "pending",
        notified: false
      })
    });

    // 2️⃣ إضافة العميل
    await fetch(`${SUPABASE_URL}/rest/v1/customers`, {
      method: "POST",
      headers: headers(),
      body: JSON.stringify([{
        name: name,
        phone: phone,
        branch: "الرياض",
        stamps: [false,false,false,false,false],
        total_rewards: 0,
        history: [],
        referral_code: phone.slice(-4) + "ABC",
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      }])
    });

    alert("تم الحجز بنجاح ✅");

  } catch (e) {
    console.error(e);
    alert("فشل الحجز ❌");
  }
}
</script>

</body>
</html>
